server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Static site ────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── /data — volume-mounted persistent data ─────────────
    # Serves files AND exposes JSON directory listings
    # so the browser can auto-discover dos game zips etc.
    location /data/ {
        alias /data/;

        # Allow direct file downloads (zips, jsdos, json)
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # Auto-index in JSON format for easy browser consumption
        autoindex on;
        autoindex_format json;
        autoindex_exact_size on;
        autoindex_localtime off;
    }

    # ── Gzip ───────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
