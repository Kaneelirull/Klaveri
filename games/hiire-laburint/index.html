<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">`n<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiire Mäng 🐭</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --wall: #0a0f18;
    --wall-face: #1e3a5f;
    --wall-top: #2d5a8e;
    --path: #1a2535;
    --path2: #1e2a3a;
    --start: #2ea043;
    --finish: #f85149;
    --accent: #f9c74f;
    --text: #e6edf3;
    --muted: #7d8590;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    cursor: none;
  }
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 28px;
    transform: translate(-4px, -4px);
    filter: drop-shadow(0 2px 6px rgba(249,199,79,0.6));
    will-change: left, top;
  }
  .game-shell {
    width: min(860px, 100%);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .title {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(249,199,79,0.5);
  }
  .meta-pills { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .pill {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
  }
  .pill span { color: var(--text); }
  .level-dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
  }
  .dot.done { background: #3fb950; }
  .dot.current { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-bar {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
    min-height: 42px;
    display: flex;
    align-items: center;
    transition: color 0.3s;
  }
  .status-bar.danger { color: #f85149; }
  .status-bar.success { color: #3fb950; }

  /* Maze area: canvas + 2x2 start zone overlapping top-left */
  .maze-area {
    position: relative;
  }
  .maze-wrap {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 60px rgba(0,0,0,0.6);
    /* indent left and top to make room for start zone */
    margin-left: 80px;
    margin-top: 80px;
  }
  #maze-canvas { display: block; width: 100%; }

  /* 2x2 start zone, positioned to overlap top-left of maze */
  .start-zone {
    position: absolute;
    top: 0;
    left: 0;
    width: 160px;
    height: 160px;
    background: linear-gradient(135deg, #2ea043, #1a6e2e);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(46,160,67,0.4), 0 0 0 2px rgba(46,160,67,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
  }
  .start-zone .start-label {
    font-family: 'Baloo 2', cursive;
    font-size: 1.3rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .start-zone .start-mouse { font-size: 2rem; }
  #start-btn {
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 16px;
    border-radius: 999px;
    border: none;
    background: rgba(0,0,0,0.35);
    color: #fff;
    cursor: none;
    transition: background 0.2s, transform 0.15s;
  }
  #start-btn:hover { background: rgba(0,0,0,0.55); transform: scale(1.05); }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-left: 80px;
  }
  .btn {
    font-family: 'Baloo 2', cursive;
    font-weight: 600;
    font-size: 1rem;
    padding: 9px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: none;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #f4a228);
    color: #0d1117;
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(249,199,79,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(249,199,79,0.45); }
  .btn-secondary { background: var(--surface); color: var(--text); }
  .btn-secondary:hover { background: #21262d; }
</style>
</head>
<body>
<div id="cursor">🐭</div>

<div class="game-shell">
  <div class="topbar">
    <h1 class="title">🐭 Hiire Mäng</h1>
    <div class="meta-pills">
      <div class="pill">Tase <span id="level-num">1</span></div>
      <div class="pill">❤️ <span id="lives-val">3</span></div>
      <div class="level-dots" id="level-dots"></div>
    </div>
  </div>

  <div class="status-bar" id="status">Vajuta "Alusta" ja liigu läbi labürindi!</div>

  <div class="maze-area">
    <!-- 2x2 START zone, bottom-right quadrant overlaps maze cell (0,0) -->
    <div class="start-zone" id="start-zone">
      <div class="start-mouse">🐭</div>
      <div class="start-label">START</div>
      <button id="start-btn">Alusta ▶</button>
    </div>
    <div class="maze-wrap">
      <canvas id="maze-canvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="new-maze-btn">🔀 Uus labürint</button>
    <a class="btn btn-secondary" href="../../index.html">← Tagasi</a>
  </div>
</div>

<script>
const LEVELS = [
  { cols: 12, rows: 8,  cell: 52, lives: 3 },
  { cols: 16, rows: 10, cell: 44, lives: 3 },
  { cols: 20, rows: 13, cell: 36, lives: 3 },
];
const MAX_LEVELS = LEVELS.length;
const T = 6; // wall thickness

let level = 0;
let lives = 3;
let phase = 'idle'; // idle | playing | dead | won | done
let maze = null;
let finishCell = null;
let mouseInCanvas = false;

const canvas   = document.getElementById('maze-canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const livesEl  = document.getElementById('lives-val');
const levelEl  = document.getElementById('level-num');
const dotsEl   = document.getElementById('level-dots');
const cursorEl = document.getElementById('cursor');
const startBtn = document.getElementById('start-btn');

// ── Cursor ──
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

// ── Maze generation (recursive backtracker) ──
function generateMaze(cols, rows) {
  const grid = Array.from({length: rows}, () =>
    Array.from({length: cols}, () => ({ visited: false, walls: [true,true,true,true] }))
  );
  const neighbors = (r,c) => [
    [r-1,c,0,2],[r,c+1,1,3],[r+1,c,2,0],[r,c-1,3,1]
  ].filter(([nr,nc])=>nr>=0&&nr<rows&&nc>=0&&nc<cols);

  grid[0][0].visited = true;
  const stack = [{r:0,c:0}];
  while(stack.length) {
    const {r,c} = stack[stack.length-1];
    const unvisited = neighbors(r,c).filter(([nr,nc])=>!grid[nr][nc].visited);
    if(!unvisited.length){ stack.pop(); continue; }
    const [nr,nc,w1,w2] = unvisited[Math.floor(Math.random()*unvisited.length)];
    grid[r][c].walls[w1] = false;
    grid[nr][nc].walls[w2] = false;
    grid[nr][nc].visited = true;
    stack.push({r:nr,c:nc});
  }
  // Open top+left walls of (0,0) so player enters from start zone
  grid[0][0].walls[0] = false;
  grid[0][0].walls[3] = false;
  return grid;
}

// ── Pick finish (BFS farthest from 0,0) ──
function pickFinish(grid, cols, rows) {
  const dist = Array.from({length:rows},()=>Array(cols).fill(-1));
  const queue = [{r:0,c:0}];
  dist[0][0] = 0;
  const dirs = [[-1,0,0],[0,1,1],[1,0,2],[0,-1,3]];
  while(queue.length){
    const {r,c} = queue.shift();
    for(const [dr,dc,w] of dirs){
      const nr=r+dr, nc=c+dc;
      if(nr<0||nr>=rows||nc<0||nc>=cols) continue;
      if(grid[r][c].walls[w]) continue;
      if(dist[nr][nc]!==-1) continue;
      dist[nr][nc]=dist[r][c]+1;
      queue.push({r:nr,c:nc});
    }
  }
  let best={r:rows-1,c:cols-1,d:0};
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    if(dist[r][c]>best.d) best={r,c,d:dist[r][c]};
  return {r:best.r,c:best.c};
}

// ── Draw ──
const C = {
  bg:'#0d1117', path:'#1a2535', path2:'#1e2a3a',
  wall:'#0a0f18', wallFace:'#1e3a5f', wallTop:'#2d5a8e',
  finish:'#f85149', finishGlow:'rgba(248,81,73,0.35)',
  accent:'#f9c74f',
};

function draw() {
  const cfg = LEVELS[level];
  const { cols, rows } = cfg;
  const CELL = cfg.cell;
  const W = cols * CELL, H = rows * CELL;
  canvas.width = W; canvas.height = H;
  canvas.style.aspectRatio = `${W}/${H}`;

  // Floor
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    ctx.fillStyle = (r+c)%2===0 ? C.path : C.path2;
    ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
  }

  // Finish glow
  if(finishCell){
    const fx=finishCell.c*CELL, fy=finishCell.r*CELL;
    const fg=ctx.createRadialGradient(fx+CELL/2,fy+CELL/2,0,fx+CELL/2,fy+CELL/2,CELL*1.5);
    fg.addColorStop(0,C.finishGlow); fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg; ctx.fillRect(fx-CELL,fy-CELL,CELL*3,CELL*3);
  }

  // Walls
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const cell=maze[r][c], x=c*CELL, y=r*CELL;
    if(cell.walls[0]){ ctx.fillStyle=C.wall; ctx.fillRect(x,y,CELL,T); ctx.fillStyle=C.wallTop; ctx.fillRect(x,y,CELL,2); }
    if(cell.walls[1]){ ctx.fillStyle=C.wall; ctx.fillRect(x+CELL-T,y,T,CELL); }
    if(cell.walls[2]){ ctx.fillStyle=C.wall; ctx.fillRect(x,y+CELL-T,CELL,T); ctx.fillStyle=C.wallTop; ctx.fillRect(x,y+CELL-2,CELL,2); }
    if(cell.walls[3]){ ctx.fillStyle=C.wall; ctx.fillRect(x,y,T,CELL); }
  }

  // Outer border — open top-left corner (entry from start zone)
  ctx.fillStyle=C.wall;
  ctx.fillRect(CELL,0,W-CELL,T);   // top, skip col 0
  ctx.fillRect(0,H-T,W,T);          // bottom
  ctx.fillRect(0,CELL,T,H-CELL);   // left, skip row 0
  ctx.fillRect(W-T,0,T,H);          // right

  // Finish cell
  if(finishCell){
    const fx=finishCell.c*CELL, fy=finishCell.r*CELL;
    ctx.fillStyle=C.finish;
    ctx.fillRect(fx+T+2,fy+T+2,CELL-T*2-4,CELL-T*2-4);
    ctx.fillStyle='#fff';
    ctx.font=`bold ${CELL*0.28}px Baloo 2,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('FINIŠ',fx+CELL/2,fy+CELL/2);
  }
}

// ── Pulse animation on finish ──
let raf;
function loop(){
  if(phase==='idle'||phase==='playing') {
    draw();
    if(finishCell && phase==='playing'){
      const cfg=LEVELS[level], CELL=cfg.cell;
      const fx=finishCell.c*CELL, fy=finishCell.r*CELL;
      const pulse=0.5+0.5*Math.sin(Date.now()/600);
      ctx.strokeStyle=`rgba(248,81,73,${0.3+0.4*pulse})`;
      ctx.lineWidth=3;
      ctx.strokeRect(fx+T,fy+T,CELL-T*2,CELL-T*2);
    }
  }
  raf=requestAnimationFrame(loop);
}

// ── Init ──
function initLevel(lvl) {
  level = lvl;
  lives = LEVELS[level].lives;
  phase = 'idle';
  maze = generateMaze(LEVELS[level].cols, LEVELS[level].rows);
  finishCell = pickFinish(maze, LEVELS[level].cols, LEVELS[level].rows);
  updateUI();
  draw();
  startBtn.textContent = 'Alusta ▶';
  startBtn.disabled = false;
}

function updateUI() {
  livesEl.textContent = lives;
  levelEl.textContent = level+1;
  dotsEl.innerHTML='';
  for(let i=0;i<MAX_LEVELS;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<level?' done':i===level?' current':'');
    dotsEl.appendChild(d);
  }
}

function setStatus(msg,type=''){
  statusEl.textContent=msg;
  statusEl.className='status-bar'+(type?' '+type:'');
}

// ── Hit detection ──
function cellFromMouse(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const x=(e.clientX-rect.left)*sx, y=(e.clientY-rect.top)*sy;
  const cfg=LEVELS[level];
  return { c:Math.floor(x/cfg.cell), r:Math.floor(y/cfg.cell), x, y };
}

function isOnFinish(e){
  if(!finishCell) return false;
  const {r,c}=cellFromMouse(e);
  return r===finishCell.r && c===finishCell.c;
}

function isOnWall(e){
  const {x,y}=cellFromMouse(e);
  const cfg=LEVELS[level], CELL=cfg.cell, PAD=T+2;
  const c=Math.floor(x/CELL), r=Math.floor(y/CELL);
  if(r<0||r>=cfg.rows||c<0||c>=cfg.cols) return true;
  const lx=x-c*CELL, ly=y-r*CELL;
  const cell=maze[r][c];
  if(cell.walls[0]&&ly<PAD) return true;
  if(cell.walls[2]&&ly>CELL-PAD) return true;
  if(cell.walls[3]&&lx<PAD) return true;
  if(cell.walls[1]&&lx>CELL-PAD) return true;
  return false;
}

canvas.addEventListener('mouseenter', ()=>{ mouseInCanvas=true; });
canvas.addEventListener('mouseleave', ()=>{
  mouseInCanvas=false;
  if(phase==='playing') hitWall();
});
canvas.addEventListener('mousemove', e=>{
  if(phase!=='playing') return;
  if(isOnWall(e)){ hitWall(); return; }
  if(isOnFinish(e)){ winLevel(); }
});

function startPlaying(){
  if(phase==='dead'||phase==='done') return;
  phase='playing';
  setStatus('Liigu FINIŠisse ilma seinu puudutamata! 🏃');
  startBtn.textContent='Uuesti ↺';
  draw();
}

function hitWall(){
  if(phase!=='playing') return;
  phase='idle';
  lives--;
  livesEl.textContent=lives;
  if(lives<=0){
    phase='dead';
    setStatus('Kõik elud otsas! 💀 Vajuta "Alusta" uuesti.','danger');
    startBtn.textContent='Proovi uuesti ↺';
    draw();
  } else {
    setStatus(`Sein! ❌ ${lives} elu alles — vajuta "Uuesti" et proovida.`,'danger');
    startBtn.textContent='Uuesti ↺';
    draw();
  }
}

function winLevel(){
  if(phase!=='playing') return;
  phase='won';
  setStatus('🎉 Tubli! Jõudsid FINIŠisse!','success');
  draw();
  ctx.fillStyle='rgba(46,160,67,0.2)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font=`bold ${LEVELS[level].cell*1.8}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🎉',canvas.width/2,canvas.height/2);
  setTimeout(()=>{
    if(level+1<MAX_LEVELS){ initLevel(level+1); }
    else { setStatus('🏆 Kõik tasemed läbitud! Oled meister!','success'); phase='done'; }
  },1600);
}

// ── Buttons ──
startBtn.addEventListener('click', ()=>{
  if(phase==='dead'){
    lives=LEVELS[level].lives;
    livesEl.textContent=lives;
    phase='idle';
  }
  startPlaying();
});

document.getElementById('new-maze-btn').addEventListener('click', ()=>initLevel(level));

// ── Go ──
initLevel(0);
cancelAnimationFrame(raf);
loop();
</script>
</body>
</html>
