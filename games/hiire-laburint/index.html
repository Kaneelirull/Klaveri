<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiire Labürint 🐭</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap');

:root {
  --bg: #1a2e1a;
  --surface: #22381e;
  --wall: #2d5a1b;
  --wall-top: #4a8c2a;
  --path: #f5e6c8;
  --path2: #ede0b8;
  --accent: #f9c74f;
  --accent2: #f94144;
  --accent3: #90be6d;
  --star-col: #ffd60a;
  --text: #f5f0e8;
  --muted: rgba(245,240,232,0.55);
  --finish: #43aa8b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  cursor: none;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(74,140,42,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(67,170,139,0.15) 0%, transparent 50%);
}

/* Custom cursor — little mouse */
#cursor {
  position: fixed;
  width: 28px; height: 28px;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  font-size: 22px;
  line-height: 1;
  transition: transform 0.05s;
  filter: drop-shadow(0 0 6px rgba(249,199,79,0.8));
}

/* Header */
.header {
  width: 100%;
  padding: 14px 30px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 900px;
}

.title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(249,199,79,0.5), 0 3px 0 rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  gap: 8px;
}

.hud {
  display: flex;
  gap: 18px;
  align-items: center;
}

.hud-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.1rem;
  font-weight: 700;
}

.hud-item .icon { font-size: 1.3rem; }
.hud-item .val { color: var(--accent); }
.lives-bar { display: flex; gap: 4px; }
.life { font-size: 1.2rem; transition: opacity 0.3s; }
.life.lost { opacity: 0.2; filter: grayscale(1); }

/* Level indicator */
.level-strip {
  display: flex;
  gap: 8px;
  margin: 8px 0 4px;
  align-items: center;
}
.level-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: all 0.3s;
}
.level-dot.done { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
.level-dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent); transform: scale(1.4); }

/* Main game area */
.game-wrap {
  position: relative;
  margin: 6px 0 0;
}

/* Canvas */
#maze-canvas {
  display: block;
  border-radius: 12px;
  box-shadow: 0 0 0 4px rgba(74,140,42,0.4), 0 20px 60px rgba(0,0,0,0.6);
}

/* Overlay screens */
.overlay {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: rgba(15,25,15,0.88);
  backdrop-filter: blur(6px);
  z-index: 10;
  animation: fadeIn 0.35s ease;
}
.overlay.hidden { display: none; }

@keyframes fadeIn {
  from { opacity:0; transform:scale(0.96); }
  to   { opacity:1; transform:scale(1); }
}

.overlay-emoji { font-size: 4.5rem; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }

.overlay h2 {
  font-family: 'Baloo 2', cursive;
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(249,199,79,0.6);
  text-align: center;
}

.overlay p {
  color: var(--muted);
  font-size: 0.95rem;
  text-align: center;
  max-width: 280px;
  line-height: 1.5;
}

.btn {
  font-family: 'Baloo 2', cursive;
  font-size: 1.1rem;
  font-weight: 700;
  padding: 10px 28px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #f4a024);
  color: #1a1a00;
  box-shadow: 0 4px 16px rgba(249,199,79,0.5);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(249,199,79,0.7); }
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-secondary:hover { background: rgba(255,255,255,0.2); }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

/* Stars collected display */
.stars-row {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 1.5rem;
}

/* Flash overlay for wall hit */
.flash {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  background: rgba(249,65,68,0.35);
  pointer-events: none;
  z-index: 8;
  opacity: 0;
  transition: opacity 0.1s;
}
.flash.show { opacity: 1; }

/* Timer bar */
.timer-wrap {
  width: 100%;
  max-width: 560px;
  margin: 6px 0 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.timer-bar-bg {
  flex: 1;
  height: 7px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.timer-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent3), var(--accent));
  transition: width 0.3s linear;
}
.timer-label {
  font-family: 'Baloo 2', cursive;
  font-size: 0.85rem;
  color: var(--muted);
  white-space: nowrap;
  min-width: 40px;
  text-align: right;
}

/* Home button */
.home-btn {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 0.8rem;
  color: var(--muted);
  cursor: pointer;
  text-decoration: none;
  font-family: 'Nunito', sans-serif;
  transition: all 0.2s;
  z-index: 20;
}
.home-btn:hover { color: var(--text); background: rgba(0,0,0,0.6); }
</style>
</head>
<body>

<div id="cursor">🐭</div>

<a class="home-btn" href="../../index.html">← Tagasi</a>

<div class="header">
  <div class="title">🌿 Hiire Labürint</div>
  <div class="hud">
    <div class="hud-item">
      <span class="icon">⭐</span>
      <span class="val" id="score-val">0</span>
    </div>
    <div class="lives-bar" id="lives-bar"></div>
  </div>
</div>

<div class="level-strip" id="level-strip"></div>

<div class="game-wrap">
  <canvas id="maze-canvas"></canvas>
  <div class="flash" id="flash"></div>

  <!-- Start overlay -->
  <div class="overlay" id="ov-start">
    <div class="overlay-emoji">🐭</div>
    <h2>Hiire Labürint!</h2>
    <p>Juhi hiirt START-ist FINIŠ-ini ilma seinu puudutamata.<br>Koguga teel ⭐ tähti!</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startGame()">Alusta! 🚀</button>
    </div>
  </div>

  <!-- Level complete overlay -->
  <div class="overlay hidden" id="ov-level">
    <div class="overlay-emoji" id="ov-lvl-emoji">🎉</div>
    <h2 id="ov-lvl-title">Tase läbitud!</h2>
    <div class="stars-row" id="ov-stars"></div>
    <p id="ov-lvl-msg">Suurepärane!</p>
    <div class="btn-row">
      <button class="btn btn-primary" id="ov-next-btn" onclick="nextLevel()">Järgmine tase ➡</button>
    </div>
  </div>

  <!-- Game over overlay -->
  <div class="overlay hidden" id="ov-dead">
    <div class="overlay-emoji">😵</div>
    <h2>Oops!</h2>
    <p>Sa puutusid seina! Proovi uuesti.</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="restartLevel()">Proovi uuesti 🔄</button>
      <button class="btn btn-secondary" onclick="goHome()">Algusesse</button>
    </div>
  </div>

  <!-- All done overlay -->
  <div class="overlay hidden" id="ov-done">
    <div class="overlay-emoji">🏆</div>
    <h2>Labürint läbitud!</h2>
    <p>Sa läbisid kõik tasemed! Oled tõeline hiire-kangelane!</p>
    <div class="hud-item" style="font-size:1.6rem;">
      <span>⭐</span><span class="val" id="final-score"></span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="restartAll()">Mängi uuesti 🔄</button>
      <button class="btn btn-secondary" onclick="goHome()">Koju</button>
    </div>
  </div>
</div>

<div class="timer-wrap" id="timer-wrap" style="display:none;">
  <span class="timer-label" id="timer-label">0s</span>
  <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
</div>

<script>
// ==================== MAZE DEFINITIONS ====================
// Each maze: grid of 0=path, 1=wall. Plus: star positions, start, end.
// Using a cell-based system: each cell is CELL px. Walls are drawn as filled cells.

const CELL = 28;

// Build mazes as arrays of strings (W=wall, .=path, S=start, E=end, *=star)
const MAZE_DEFS = [
  // Level 1 — very simple L-shape
  {
    time: 30,
    grid: [
      "WWWWWWWWWWWWWWWWWWWW",
      "WSSSS..............W",
      "W....WWWWWWWWWWW...W",
      "W....W.............W",
      "WWWWWW.WWWWWWWWWWWWW",
      "W......W...........W",
      "W.WWWWWW.WWWWWWW...W",
      "W.W......W.........W",
      "W.W.WWWWWW.WWWWWW..W",
      "W.W.W..............W",
      "W.W.W.WWWWWWWWWWW..W",
      "W.W.W.W............W",
      "W...W.W.WWWWWWWWWWWW",
      "WWW.W.W.W..........W",
      "W...W.W.W..WWWWWW..W",
      "W.WWW.W.W..W.......W",
      "W.....W....W...EEEEW",
      "WWWWWWWWWWWWWWWWWWWW",
    ],
    stars: []  // will be auto-placed
  },
  // Level 2 — more corridors
  {
    time: 45,
    grid: [
      "WWWWWWWWWWWWWWWWWWWWWWWW",
      "WSSW...................W",
      "W..W.WWWWWWWWWWWWWWW..W",
      "W..W.W.............W..W",
      "W..W.W.WWWWWWWWWW..W..W",
      "W....W.W........W..W..W",
      "WWWWWW.W.WWWWWW.W..W..W",
      "W......W.W......W..W..W",
      "W.WWWWWW.W.WWWWWW..W..W",
      "W.W......W.W.......W..W",
      "W.W.WWWWWW.W.WWWWWWW..W",
      "W.W.W......W.W.........W",
      "W.W.W.WWWWWW.W.WWWWWWWW",
      "W.W.W.W......W.W......EW",
      "W.W.W.W.WWWWWW.W.WWWW.W",
      "W...W.W.W......W......WW",
      "WWW...W.W.WWWWWWWWWWWWW",
      "W.WWWWW.W..............W",
      "W.......WWWWWWWWWWWWWWWW",
    ],
    stars: []
  },
  // Level 3 — complex
  {
    time: 60,
    grid: [
      "WWWWWWWWWWWWWWWWWWWWWWWWWW",
      "WSSW......................W",
      "W..W.WWWWWWWWWWWWWWWWWW..W",
      "W..W.W................W..W",
      "W....W.WWWWWWWWWWWWW..W..W",
      "WWWWWW.W...........W..W..W",
      "W......W.WWWWWWWWW.W..W..W",
      "W.WWWWWW.W.......W.W..W..W",
      "W.W......W.WWWWW.W.W..W..W",
      "W.W.WWWWWW.W...W.W.W..W..W",
      "W.W.W......W.W.W.W.W..W..W",
      "W.W.W.WWWWWW.W.W.W.W..W..W",
      "W.W.W.W......W.W.W.W..W..W",
      "W.W.W.W.WWWWWW.W.W.W..W..W",
      "W.W.W.W.W......W.W.W..W..W",
      "W...W.W.W.WWWWWW.W.W..W..W",
      "WWW.W.W.W.W......W.W..W..W",
      "W...W.W.W.W.WWWWWW.W..W..W",
      "W.WWW.W.W.W.W......W..W..W",
      "W.W...W.W.W.W.WWWWWW..W..W",
      "W.W.WWW.W.W.W.W........W..W",
      "W.W.W...W.W.W.W.WWWWWWWW.W",
      "W...W.WWW.W.W.W...........W",
      "WWW.W.....W.W.WWWWWWWWWWWW",
      "W...WWWWWWW.W.............W",
      "W...........WWWWWWWWWWWEEEW",
      "WWWWWWWWWWWWWWWWWWWWWWWWWW",
    ],
    stars: []
  }
];

// ==================== STATE ====================
let currentLevel = 0;
let lives = 3;
let score = 0;
let levelStars = 0;
let gameActive = false;
let timerInterval = null;
let timeLeft = 30;
let maxTime = 30;
let mouseOnCanvas = false;

// Parsed maze data
let mazeData = { rows:0, cols:0, cells:[], startCell:null, endCells:[], starCells:[] };
let starCollected = [];

const canvas = document.getElementById('maze-canvas');
const ctx = canvas.getContext('2d');

// ==================== CURSOR ====================
const cursorEl = document.getElementById('cursor');
let cursorX = -100, cursorY = -100;

document.addEventListener('mousemove', e => {
  cursorX = e.clientX;
  cursorY = e.clientY;
  cursorEl.style.left = cursorX + 'px';
  cursorEl.style.top = cursorY + 'px';
  if(gameActive) checkCollision(e);
});

// ==================== UTILS ====================
function showOverlay(id) {
  ['ov-start','ov-level','ov-dead','ov-done'].forEach(i => {
    document.getElementById(i).classList.toggle('hidden', i !== id);
  });
}
function hideAllOverlays() {
  ['ov-start','ov-level','ov-dead','ov-done'].forEach(i =>
    document.getElementById(i).classList.add('hidden'));
}

function updateLives() {
  const bar = document.getElementById('lives-bar');
  bar.innerHTML = '';
  for(let i=0;i<3;i++){
    const l = document.createElement('span');
    l.className = 'life' + (i >= lives ? ' lost' : '');
    l.textContent = '🐭';
    bar.appendChild(l);
  }
}

function updateScore() {
  document.getElementById('score-val').textContent = score;
}

function buildLevelStrip() {
  const strip = document.getElementById('level-strip');
  strip.innerHTML = '';
  MAZE_DEFS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'level-dot' + (i < currentLevel ? ' done' : i === currentLevel ? ' active' : '');
    strip.appendChild(d);
  });
}

// ==================== MAZE PARSING ====================
function parseMaze(def) {
  const rows = def.grid;
  const numRows = rows.length;
  const numCols = Math.max(...rows.map(r => r.length));

  const cells = [];
  let startCell = null;
  const endCells = [];
  const starCells = [];

  for(let r=0; r<numRows; r++){
    cells[r] = [];
    for(let c=0; c<numCols; c++){
      const ch = (rows[r][c] || 'W');
      let type = 'wall';
      if(ch === '.' || ch === ' ') type = 'path';
      else if(ch === 'S') { type = 'start'; startCell = {r,c}; }
      else if(ch === 'E') { type = 'end'; endCells.push({r,c}); }
      else if(ch === '*') { type = 'star'; starCells.push({r,c}); }
      cells[r][c] = type;
    }
  }

  // Auto-place 3 stars on path cells if none defined
  if(starCells.length === 0){
    const pathCells = [];
    for(let r=1; r<numRows-1; r++)
      for(let c=1; c<numCols-1; c++)
        if(cells[r][c]==='path') pathCells.push({r,c});
    // Pick 3 spread-out path cells
    const step = Math.floor(pathCells.length / 4);
    for(let i=1; i<=3; i++){
      const idx = Math.min(step*i, pathCells.length-1);
      starCells.push(pathCells[idx]);
      cells[pathCells[idx].r][pathCells[idx].c] = 'star';
    }
  }

  return { rows: numRows, cols: numCols, cells, startCell, endCells, starCells };
}

// ==================== DRAWING ====================
const COLORS = {
  wall:    '#2d5a1b',
  wallTop: '#4a8c2a',
  path:    '#f5e6c8',
  path2:   '#ede0b8',
  start:   '#43aa8b',
  end:     '#f94144',
  star:    '#ffd60a',
  starGlow:'rgba(255,214,10,0.4)',
};

function drawMaze() {
  const { rows, cols, cells } = mazeData;
  canvas.width  = cols * CELL;
  canvas.height = rows * CELL;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      const x = c*CELL, y = r*CELL;
      const type = cells[r][c];

      if(type === 'wall'){
        // Wall body
        ctx.fillStyle = COLORS.wall;
        ctx.fillRect(x, y, CELL, CELL);
        // Wall top highlight
        ctx.fillStyle = COLORS.wallTop;
        ctx.fillRect(x, y, CELL, 5);
        // Subtle texture dots
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(x+2, y+8, 3, 3);
        ctx.fillRect(x+CELL-8, y+14, 3, 3);
      } else {
        // Path — checkerboard tint
        ctx.fillStyle = ((r+c)%2===0) ? COLORS.path : COLORS.path2;
        ctx.fillRect(x, y, CELL, CELL);

        if(type === 'start'){
          ctx.fillStyle = COLORS.start;
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${CELL*0.45}px Nunito`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('S', x+CELL/2, y+CELL/2+1);
        }

        if(type === 'end'){
          ctx.fillStyle = COLORS.end;
          ctx.fillRect(x, y, CELL, CELL);
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${CELL*0.38}px Nunito`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('F', x+CELL/2, y+CELL/2+1);
        }

        if(type === 'star'){
          const starIdx = mazeData.starCells.findIndex(s=>s.r===r&&s.c===c);
          if(!starCollected[starIdx]){
            // Glow
            const grd = ctx.createRadialGradient(x+CELL/2, y+CELL/2, 0, x+CELL/2, y+CELL/2, CELL*0.7);
            grd.addColorStop(0, COLORS.starGlow);
            grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd;
            ctx.fillRect(x-CELL*0.2, y-CELL*0.2, CELL*1.4, CELL*1.4);
            // Star emoji
            ctx.font = `${CELL*0.75}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⭐', x+CELL/2, y+CELL/2+1);
          }
        }
      }
    }
  }

  // Grid lines subtle
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 0.5;
  for(let r=0;r<=rows;r++){
    ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(cols*CELL,r*CELL); ctx.stroke();
  }
  for(let c=0;c<=cols;c++){
    ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,rows*CELL); ctx.stroke();
  }
}

// ==================== COLLISION ====================
function getCanvasCell(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  return {
    c: Math.floor(x / CELL),
    r: Math.floor(y / CELL),
    x, y
  };
}

function checkCollision(e) {
  if(!gameActive) return;
  const { r, c, x, y } = getCanvasCell(e);
  const { rows, cols, cells } = mazeData;

  // Off canvas — fine, no penalty
  if(r < 0 || r >= rows || c < 0 || c >= cols) return;

  const type = cells[r][c];

  if(type === 'wall') {
    hitWall();
    return;
  }

  if(type === 'end') {
    levelComplete();
    return;
  }

  if(type === 'star') {
    const idx = mazeData.starCells.findIndex(s=>s.r===r&&s.c===c);
    if(idx >= 0 && !starCollected[idx]) {
      starCollected[idx] = true;
      score += 10;
      levelStars++;
      updateScore();
      drawMaze();
    }
  }
}

function hitWall() {
  gameActive = false;
  stopTimer();
  lives--;
  updateLives();

  // Flash red
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 300);

  if(lives <= 0) {
    setTimeout(() => { lives = 0; showOverlay('ov-dead'); }, 400);
  } else {
    setTimeout(() => restartLevel(true), 500);
  }
}

function levelComplete() {
  gameActive = false;
  stopTimer();

  // Time bonus
  const timeBonus = Math.round(timeLeft * 2);
  score += timeBonus + (levelStars * 10);
  updateScore();

  const starsEarned = levelStars;
  const emoji = starsEarned >= 3 ? '🏆' : starsEarned >= 2 ? '🌟' : starsEarned >= 1 ? '⭐' : '🎉';

  document.getElementById('ov-lvl-emoji').textContent = emoji;
  document.getElementById('ov-lvl-title').textContent = 'Tase ' + (currentLevel+1) + ' läbitud!';
  document.getElementById('ov-lvl-msg').textContent =
    `Ajabonus: +${timeBonus} | Tähed: +${starsEarned*10}`;

  // Stars display
  const sr = document.getElementById('ov-stars');
  sr.innerHTML = '';
  for(let i=0;i<3;i++){
    sr.innerHTML += `<span style="opacity:${i<starsEarned?1:0.2};filter:${i<starsEarned?'':'grayscale(1)'}">⭐</span>`;
  }

  const nextBtn = document.getElementById('ov-next-btn');
  if(currentLevel + 1 >= MAZE_DEFS.length) {
    nextBtn.textContent = 'Lõpp! 🏆';
    nextBtn.onclick = showDone;
  } else {
    nextBtn.textContent = 'Järgmine tase ➡';
    nextBtn.onclick = nextLevel;
  }

  showOverlay('ov-level');
}

// ==================== TIMER ====================
function startTimer() {
  const def = MAZE_DEFS[currentLevel];
  timeLeft = def.time;
  maxTime = def.time;
  document.getElementById('timer-wrap').style.display = 'flex';
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 1);
    updateTimerUI();
    if(timeLeft <= 0 && gameActive) {
      hitWall(); // treat timeout as wall hit
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimerUI() {
  document.getElementById('timer-label').textContent = timeLeft + 's';
  const pct = (timeLeft / maxTime) * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 50
    ? 'linear-gradient(90deg,#90be6d,#f9c74f)'
    : pct > 25
    ? 'linear-gradient(90deg,#f9c74f,#f4a024)'
    : 'linear-gradient(90deg,#f94144,#f4a024)';
}

// ==================== GAME FLOW ====================
function loadLevel() {
  const def = MAZE_DEFS[currentLevel];
  mazeData = parseMaze(def);
  starCollected = new Array(mazeData.starCells.length).fill(false);
  levelStars = 0;
  buildLevelStrip();
  drawMaze();
}

function startGame() {
  currentLevel = 0;
  lives = 3;
  score = 0;
  updateLives();
  updateScore();
  loadLevel();
  hideAllOverlays();
  gameActive = true;
  startTimer();
}

function restartLevel(keepLives = false) {
  stopTimer();
  if(!keepLives) lives = Math.max(0, lives);
  loadLevel();
  hideAllOverlays();
  gameActive = true;
  startTimer();
}

function nextLevel() {
  currentLevel++;
  stopTimer();
  if(currentLevel >= MAZE_DEFS.length) { showDone(); return; }
  loadLevel();
  hideAllOverlays();
  gameActive = true;
  startTimer();
}

function showDone() {
  document.getElementById('final-score').textContent = score;
  showOverlay('ov-done');
}

function restartAll() {
  startGame();
}

function goHome() {
  window.location.href = '../../index.html';
}

// ==================== INIT ====================
updateLives();
updateScore();
buildLevelStrip();

// Draw first maze preview
mazeData = parseMaze(MAZE_DEFS[0]);
starCollected = new Array(mazeData.starCells.length).fill(false);
drawMaze();
showOverlay('ov-start');
</script>
