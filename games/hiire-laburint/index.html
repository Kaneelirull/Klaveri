<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiire Mäng 🐭</title>
<style>
  :root {
    --bg: #0f131a;
    --surface: #171f2b;
    --path: #f6f0db;
    --wall: #22344a;
    --wall-edge: #3f5d7f;
    --start: #7fd38a;
    --finish: #ff6b6b;
    --accent: #ffd166;
    --text: #ecf2ff;
    --muted: #9fb2ce;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #182334, var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .game-shell {
    width: min(900px, 100%);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .title {
    margin: 0;
    font-size: 2rem;
  }

  .meta {
    display: flex;
    gap: 18px;
    color: var(--muted);
    font-weight: 700;
  }

  .status {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--accent);
    padding: 10px 14px;
    border-radius: 10px;
    margin-bottom: 12px;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  #maze {
    position: relative;
    width: 100%;
    max-width: 820px;
    height: 430px;
    background: var(--path);
    border: 8px solid #0a0f15;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  }

  .wall {
    position: absolute;
    background: linear-gradient(180deg, var(--wall-edge), var(--wall));
    border-radius: 8px;
  }

  .zone {
    position: absolute;
    border-radius: 10px;
    font-weight: 700;
    color: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px;
  }

  .start-zone {
    left: 18px;
    bottom: 16px;
    width: 132px;
    height: 96px;
    background: var(--start);
  }

  .finish-zone {
    right: 18px;
    top: 16px;
    width: 126px;
    height: 86px;
    background: var(--finish);
  }

  #start-btn {
    border: 0;
    border-radius: 999px;
    font-weight: 700;
    padding: 10px 14px;
    background: #1f3d20;
    color: #fff;
    cursor: pointer;
  }

  .controls {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    background: #26384f;
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--text);
    border-radius: 10px;
    padding: 9px 12px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="game-shell">
  <div class="topbar">
    <h1 class="title">🐭 Hiire Mäng</h1>
    <div class="meta">
      <span>Eesmärk: START ➜ FINIŠ</span>
      <span>Elud: <strong id="lives">3</strong></span>
    </div>
  </div>

  <div class="status" id="status">Vii kursor START alale ja vajuta "Alusta".</div>

  <div id="maze">
    <div class="zone start-zone">
      <button id="start-btn" type="button">Alusta</button>
    </div>
    <div class="zone finish-zone" id="finish">FINIŠ</div>

    <div class="wall" style="left:165px; top:0; width:30px; height:335px;"></div>
    <div class="wall" style="left:165px; top:360px; width:30px; height:70px;"></div>

    <div class="wall" style="left:165px; top:120px; width:220px; height:30px;"></div>
    <div class="wall" style="left:260px; top:120px; width:30px; height:220px;"></div>
    <div class="wall" style="left:260px; top:310px; width:210px; height:30px;"></div>

    <div class="wall" style="left:385px; top:0; width:30px; height:230px;"></div>
    <div class="wall" style="left:385px; top:255px; width:30px; height:175px;"></div>

    <div class="wall" style="left:475px; top:90px; width:200px; height:30px;"></div>
    <div class="wall" style="left:560px; top:90px; width:30px; height:250px;"></div>

    <div class="wall" style="left:675px; top:0; width:30px; height:260px;"></div>
    <div class="wall" style="left:675px; top:285px; width:30px; height:145px;"></div>

    <div class="wall" style="left:475px; top:340px; width:130px; height:30px;"></div>
  </div>

  <div class="controls">
    <button class="btn" id="reset" type="button">Alusta uuesti</button>
    <a class="btn" href="../../index.html">← Tagasi mängude valikusse</a>
  </div>
</div>

<script>
  const livesEl = document.getElementById('lives');
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');
  const finishEl = document.getElementById('finish');
  const maze = document.getElementById('maze');
  const resetBtn = document.getElementById('reset');

  let lives = 3;
  let started = false;
  let won = false;

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function updateLives() {
    livesEl.textContent = String(lives);
  }

  function loseLife() {
    if (!started || won) return;
    lives -= 1;
    started = false;
    updateLives();

    if (lives <= 0) {
      setStatus('Kõik elud otsas! Vajuta "Alusta uuesti" ja proovi uuesti.');
    } else {
      setStatus('Puudutasid seina! Mine START alale tagasi ja vajuta "Alusta".');
    }
  }

  function startRun() {
    if (lives <= 0) {
      setStatus('Elud on otsas. Vajuta "Alusta uuesti".');
      return;
    }
    won = false;
    started = true;
    setStatus('Liigu rahulikult FINIŠ alale ilma seinu puudutamata!');
  }

  function winRun() {
    if (!started || won) return;
    won = true;
    started = false;
    setStatus('Tubli! Jõudsid FINIŠisse! 🎉');
  }

  function resetGame() {
    lives = 3;
    won = false;
    started = false;
    updateLives();
    setStatus('Vii kursor START alale ja vajuta "Alusta".');
  }

  startBtn.addEventListener('mouseenter', startRun);
  startBtn.addEventListener('click', startRun);
  finishEl.addEventListener('mouseenter', winRun);
  maze.addEventListener('mouseleave', loseLife);
  document.querySelectorAll('.wall').forEach(wall => wall.addEventListener('mouseenter', loseLife));
  resetBtn.addEventListener('click', resetGame);
</script>
</body>
</html>
